<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Pixel</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0b0f19;
            color: #f3f4f6;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 10px;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 100%;
        }
        .header {
            margin-bottom: 12px;
            text-align: center;
        }
        h1 {
            font-size: 24px;
            color: #facc15;
            text-shadow: 0 0 10px rgba(250, 204, 21, 0.4);
            margin-bottom: 5px;
            letter-spacing: 1px;
        }
        .scores {
            display: flex;
            gap: 20px;
            font-size: 16px;
            font-weight: bold;
            color: #e5e7eb;
        }
        .score-val {
            color: #facc15;
        }
        canvas {
            background-color: #111827;
            border: 4px solid #facc15;
            box-shadow: 0 0 20px rgba(250, 204, 21, 0.2);
            border-radius: 8px;
            max-width: 100%;
            height: 400px;
            width: 320px;
            display: block;
        }
        .status-overlay {
            position: absolute;
            background: rgba(11, 15, 25, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            padding: 24px;
            border: 2px solid #facc15;
            text-align: center;
            width: 250px;
        }
        .status-overlay h2 {
            color: #facc15;
            font-size: 24px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .btn {
            background-color: #facc15;
            color: #0b0f19;
            border: none;
            padding: 8px 16px;
            font-family: inherit;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 15px;
            transition: all 0.2s;
        }
        .btn:hover {
            background-color: #fde047;
            transform: scale(1.05);
        }
        .controls-hint {
            margin-top: 12px;
            font-size: 11px;
            color: #6b7280;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>FLAPPY PIXEL</h1>
            <div class="scores">
                <div>SCORE: <span id="score" class="score-val">0</span></div>
                <div>HI-SCORE: <span id="hi-score" class="score-val">0</span></div>
            </div>
        </div>

        <div style="position: relative; display: flex; justify-content: center; align-items: center;">
            <canvas id="gameCanvas" width="320" height="400"></canvas>
            
            <div id="overlay" class="status-overlay">
                <h2 id="overlayTitle">Flappy Pixel</h2>
                <p id="overlaySub">Flap to stay aloft!</p>
                <button id="startBtn" class="btn">FLAP MY WINGS</button>
            </div>
        </div>

        <div class="controls-hint">
            Press SPACEBAR, click on Screen, or tap mobile triggers to Flap!
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const hiScoreEl = document.getElementById('hi-score');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlayTitle');
        const overlaySub = document.getElementById('overlaySub');
        const startBtn = document.getElementById('startBtn');

        // Physics Parameters
        const gravity = 0.22;
        const jump = -4.6;
        
        let birdX = 70;
        let birdY = 200;
        let birdVelocity = 0;
        let birdRadius = 10;

        let pipes = [];
        const pipeWidth = 46;
        const pipeGap = 110;
        const pipeSpeed = 1.6;
        let frameCount = 0;

        let score = 0;
        let highScore = localStorage.getItem('flappy_highScore') || 0;
        hiScoreEl.textContent = highScore;

        let gameActive = false;

        function initGame() {
            birdY = 160;
            birdVelocity = 0;
            pipes = [];
            score = 0;
            scoreEl.textContent = score;
            frameCount = 0;
            gameActive = true;
            overlay.style.display = 'none';
        }

        // Action trigger
        function flap() {
            if (gameActive) {
                birdVelocity = jump;
            }
        }

        // Tap/Click/Press hooks
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                flap();
            }
        });
        canvas.addEventListener('click', (e) => {
            e.preventDefault();
            flap();
        });

        function update() {
            if (!gameActive) return;

            frameCount++;
            // Bird physics
            birdVelocity += gravity;
            birdY += birdVelocity;

            // Boundaries
            if (birdY + birdRadius >= canvas.height) {
                gameOver();
                return;
            }
            if (birdY - birdRadius <= 0) {
                birdY = birdRadius;
                birdVelocity = 0;
            }

            // Spawn Pipes
            if (frameCount % 105 === 0) {
                const minHeight = 40;
                const maxHeight = canvas.height - pipeGap - minHeight;
                const topPipeHeight = Math.floor(Math.random() * (maxHeight - minHeight)) + minHeight;
                
                pipes.push({
                    x: canvas.width,
                    topHeight: topPipeHeight,
                    passed: false
                });
            }

            // Move Pipes
            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= pipeSpeed;

                // Collisions
                const p = pipes[i];
                
                // Bird bounds
                const bLeft = birdX - birdRadius;
                const bRight = birdX + birdRadius;
                const bTop = birdY - birdRadius;
                const bBottom = birdY + birdRadius;

                // Pipeline bounds
                const pLeft = p.x;
                const pRight = p.x + pipeWidth;

                // Collide top
                if (bRight > pLeft && bLeft < pRight && bTop < p.topHeight) {
                    gameOver();
                    return;
                }
                
                // Collide bottom
                const bottomY = p.topHeight + pipeGap;
                if (bRight > pLeft && bLeft < pRight && bBottom > bottomY) {
                    gameOver();
                    return;
                }

                // Check Point scored
                if (!p.passed && p.x + pipeWidth < birdX) {
                    p.passed = true;
                    score++;
                    scoreEl.textContent = score;
                    if (score > highScore) {
                        highScore = score;
                        localStorage.setItem('flappy_highScore', highScore);
                        hiScoreEl.textContent = highScore;
                    }
                }

                // Remove offscreen
                if (p.x + pipeWidth < 0) {
                    pipes.splice(i, 1);
                }
            }
        }

        function draw() {
            // Draw sky dawn gradient
            const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, '#1e1b4b'); // deep purple
            grad.addColorStop(1, '#0f172a'); // slate black
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Stars background
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.fillRect(40, 60, 2, 2);
            ctx.fillRect(180, 80, 2, 2);
            ctx.fillRect(100, 160, 2, 2);
            ctx.fillRect(260, 110, 2, 2);
            ctx.fillRect(140, 280, 2, 2);
            ctx.fillRect(290, 220, 2, 2);

            // Draw Pipes
            pipes.forEach(p => {
                // Pipe styles (Retro arcade neon green)
                ctx.fillStyle = '#10b981';
                ctx.strokeStyle = '#047857';
                ctx.lineWidth = 2;

                // Top Pipe block
                ctx.fillRect(p.x, 0, pipeWidth, p.topHeight);
                ctx.strokeRect(p.x, 0, pipeWidth, p.topHeight);
                // Top Pipe rim lips
                ctx.fillStyle = '#34d399';
                ctx.fillRect(p.x - 2, p.topHeight - 12, pipeWidth + 4, 12);
                ctx.strokeRect(p.x - 2, p.topHeight - 12, pipeWidth + 4, 12);

                // Bottom Pipe block
                const bottomY = p.topHeight + pipeGap;
                const bottomHeight = canvas.height - bottomY;
                ctx.fillStyle = '#10b981';
                ctx.fillRect(p.x, bottomY, pipeWidth, bottomHeight);
                ctx.strokeRect(p.x, bottomY, pipeWidth, bottomHeight);
                // Bottom Pipe rim lips
                ctx.fillStyle = '#34d399';
                ctx.fillRect(p.x - 2, bottomY, pipeWidth + 4, 12);
                ctx.strokeRect(p.x - 2, bottomY, pipeWidth + 4, 12);
            });

            // Draw Bird (Neon Jet Engine ball)
            ctx.beginPath();
            ctx.arc(birdX, birdY, birdRadius, 0, Math.PI * 2);
            ctx.fillStyle = '#facc15'; // Golden wings
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#facc15';
            ctx.fill();
            ctx.closePath();
            ctx.shadowBlur = 0; // reset shadow

            // Draw Bird Eye and wing flaps
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(birdX + 3, birdY - 4, 3, 3); // eye
            ctx.fillStyle = '#f97316';
            ctx.fillRect(birdX - 7, birdY - 2, 6, 4); // wing
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameActive = false;
            overlayTitle.textContent = "CRASHED!";
            overlaySub.textContent = "Final Wings Score: " + score;
            startBtn.textContent = "START FLAPPING";
            overlay.style.display = 'flex';
        }

        startBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // Avoid dual trigger jump on start
            initGame();
        });

        // Frame boot
        draw();
        gameLoop();
    </script>
</body>
</html>
