<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Classic</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        body {
            background-color: #0b0f19;
            color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 10px;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 380px;
        }
        header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        h1 {
            font-size: 28px;
            font-weight: 800;
            color: #f59e0b;
            text-shadow: 0 0 10px rgba(245, 158, 11, 0.3);
            letter-spacing: -1px;
        }
        .scores-box {
            display: flex;
            gap: 8px;
        }
        .score-card {
            background: #1f2937;
            padding: 6px 12px;
            border-radius: 6px;
            text-align: center;
            min-width: 65px;
            border: 1px solid #374151;
        }
        .score-lbl {
            font-size: 9px;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .score-val {
            font-size: 16px;
            font-weight: bold;
            color: #fff;
        }
        .game-desc {
            font-size: 13px;
            color: #9ca3af;
            text-align: center;
            margin-bottom: 15px;
        }
        .restart-btn {
            background-color: #f59e0b;
            color: #0b0f19;
            border: none;
            font-weight: 700;
            font-size: 13px;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .restart-btn:hover {
            background-color: #fbbf24;
            transform: scale(1.05);
        }
        .grid-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #111827;
            border: 3px solid #f59e0b;
            border-radius: 10px;
            padding: 8px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 8px;
            position: relative;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.4);
        }
        .grid-cell {
            background-color: #1f2937;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 800;
            transition: all 0.12s ease;
            position: relative;
        }
        /* Specific neon tile styles */
        .tile-2 { background-color: #374151; color: #fff; border: 1px solid #4b5563; }
        .tile-4 { background-color: #4b5563; color: #fff; border: 1px solid #6b7280; }
        .tile-8 { background-color: #f97316; color: #fff; box-shadow: 0 0 6px rgba(249, 115, 22, 0.4); }
        .tile-16 { background-color: #ea580c; color: #fff; box-shadow: 0 0 8px rgba(234, 88, 12, 0.5); }
        .tile-32 { background-color: #ef4444; color: #fff; box-shadow: 0 0 8px rgba(239, 68, 68, 0.5); }
        .tile-64 { background-color: #dc2626; color: #fff; box-shadow: 0 0 10px rgba(220, 38, 38, 0.6); }
        .tile-128 { background-color: #eab308; color: #fff; font-size: 18px; box-shadow: 0 0 12px rgba(234, 179, 8, 0.6); }
        .tile-256 { background-color: #facc15; color: #0b0f19; font-size: 18px; box-shadow: 0 0 14px rgba(250, 204, 21, 0.7); }
        .tile-512 { background-color: #ec4899; color: #fff; font-size: 18px; box-shadow: 0 0 16px rgba(236, 72, 153, 0.7); }
        .tile-1024 { background-color: #a855f7; color: #fff; font-size: 15px; box-shadow: 0 0 18px rgba(168, 85, 247, 0.8); }
        .tile-2048 { background-color: #3b82f6; color: #fff; font-size: 15px; box-shadow: 0 0 22px rgba(59, 130, 246, 0.9); }
        .tile-above { background-color: #06b6d4; color: #fff; font-size: 14px; box-shadow: 0 0 25px rgba(6, 182, 212, 1); }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(11, 15, 25, 0.93);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            display: none;
            animation: fadeIn 0.3s forwards;
            text-align: center;
            padding: 15px;
            border: 2px dashed #f59e0b;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .overlay h2 {
            font-size: 28px;
            color: #ef4444;
            margin-bottom: 10px;
        }
        .overlay p {
            color: #9ca3af;
            margin-bottom: 20px;
        }
        .overlay-btn {
            background-color: #f59e0b;
            color: #0b0f19;
            border: none;
            font-weight: 800;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .mobile-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            margin-top: 15px;
        }
        .mobile-row {
            display: flex;
            gap: 4px;
        }
        .ctrl-btn {
            background-color: #1f2937;
            border: 1px solid #374151;
            height: 42px;
            width: 42px;
            border-radius: 6px;
            color: #fff;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .ctrl-btn:active {
            background-color: #f59e0b;
            color: #0b0f19;
        }
        @media(min-width: 480px) {
            .mobile-controls {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>2048</h1>
            <div class="scores-box">
                <div class="score-card">
                    <div class="score-lbl">SCORE</div>
                    <div id="score" class="score-val">0</div>
                </div>
                <div class="score-card">
                    <div class="score-lbl">BEST</div>
                    <div id="best" class="score-val">0</div>
                </div>
            </div>
        </header>

        <div style="width:100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <p style="font-size: 12px; color: #9ca3af;">Merge common numbers to hit <b>2048</b>!</p>
            <button id="restartBtn" class="restart-btn">New Game</button>
        </div>

        <div style="position: relative; width: 100%;">
            <div id="grid" class="grid-container">
                <!-- 16 cells -->
                <div class="grid-cell" id="c0"></div>
                <div class="grid-cell" id="c1"></div>
                <div class="grid-cell" id="c2"></div>
                <div class="grid-cell" id="c3"></div>
                <div class="grid-cell" id="c4"></div>
                <div class="grid-cell" id="c5"></div>
                <div class="grid-cell" id="c6"></div>
                <div class="grid-cell" id="c7"></div>
                <div class="grid-cell" id="c8"></div>
                <div class="grid-cell" id="c9"></div>
                <div class="grid-cell" id="ca"></div>
                <div class="grid-cell" id="cb"></div>
                <div class="grid-cell" id="cc"></div>
                <div class="grid-cell" id="cd"></div>
                <div class="grid-cell" id="ce"></div>
                <div class="grid-cell" id="cf"></div>

                <div id="endOverlay" class="overlay">
                    <h2 id="endStatusTitle">Game Over!</h2>
                    <p id="endStatusSub">Try again to merge your way to 2048.</p>
                    <button class="overlay-btn" id="overlayResetBtn">Play Again</button>
                </div>
            </div>
        </div>

        <div class="mobile-controls">
            <button class="ctrl-btn" id="m-up">▲</button>
            <div class="mobile-row">
                <button class="ctrl-btn" id="m-left">◀</button>
                <div style="width: 42px;"></div>
                <button class="ctrl-btn" id="m-right">▶</button>
            </div>
            <button class="ctrl-btn" id="m-down">▼</button>
        </div>
    </div>

    <script>
        let board = Array(16).fill(0);
        let score = 0;
        let bestScore = localStorage.getItem('2048_best') || 0;
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');
        const gridContainer = document.getElementById('grid');
        const endOverlay = document.getElementById('endOverlay');
        const endStatusTitle = document.getElementById('endStatusTitle');
        const endStatusSub = document.getElementById('endStatusSub');

        bestEl.textContent = bestScore;

        function newGame() {
            board = Array(16).fill(0);
            score = 0;
            scoreEl.textContent = 0;
            endOverlay.style.display = 'none';
            addRandomTile();
            addRandomTile();
            renderBoard();
        }

        function addRandomTile() {
            const emptyCells = [];
            for (let i = 0; i < 16; i++) {
                if (board[i] === 0) emptyCells.push(i);
            }
            if (emptyCells.length > 0) {
                const randomIdx = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                board[randomIdx] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function getTileClass(val) {
            if (val === 0) return '';
            if (val <= 2048) return 'tile-' + val;
            return 'tile-above';
        }

        function renderBoard() {
            for (let i = 0; i < 16; i++) {
                const cellEl = document.getElementById('c' + i.toString(16));
                cellEl.textContent = board[i] > 0 ? board[i] : '';
                
                // Clear any existing tile classes
                cellEl.className = 'grid-cell';
                if (board[i] > 0) {
                    cellEl.classList.add(getTileClass(board[i]));
                }
            }
        }

        function slideRowLeft(row) {
            let filteredRow = row.filter(val => val !== 0);
            let scoreAdded = 0;
            for (let i = 0; i < filteredRow.length - 1; i++) {
                if (filteredRow[i] === filteredRow[i + 1]) {
                    filteredRow[i] *= 2;
                    scoreAdded += filteredRow[i];
                    filteredRow[i + 1] = 0;
                }
            }
            filteredRow = filteredRow.filter(val => val !== 0);
            while (filteredRow.length < 4) {
                filteredRow.push(0);
            }
            return { row: filteredRow, score: scoreAdded };
        }

        function rotateLeft() {
            let newBoard = Array(16).fill(0);
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    newBoard[c * 4 + (3 - r)] = board[r * 4 + c];
                }
            }
            board = newBoard;
        }

        function attemptMove(dir) {
            let moved = false;
            let moveScore = 0;
            
            // We can handle all directions by rotating the board, shifting left, and rotating back
            // Directions: 0 = Left, 1 = Down, 2 = Right, 3 = Up
            let rotationsNeeded = 0;
            if (dir === 'left') rotationsNeeded = 0;
            else if (dir === 'down') rotationsNeeded = 1;
            else if (dir === 'right') rotationsNeeded = 2;
            else if (dir === 'up') rotationsNeeded = 3;

            for (let i = 0; i < rotationsNeeded; i++) {
                rotateLeft();
            }

            for (let r = 0; r < 4; r++) {
                const head = r * 4;
                const currentRow = [board[head], board[head+1], board[head+2], board[head+3]];
                const result = slideRowLeft(currentRow);
                
                if (JSON.stringify(currentRow) !== JSON.stringify(result.row)) {
                    moved = true;
                }
                moveScore += result.score;
                for (let c = 0; c < 4; c++) {
                    board[head + c] = result.row[c];
                }
            }

            // Rotate back
            const reverseRotations = (4 - rotationsNeeded) % 4;
            for (let i = 0; i < reverseRotations; i++) {
                rotateLeft();
            }

            if (moved) {
                score += moveScore;
                scoreEl.textContent = score;
                if (score > bestScore) {
                    bestScore = score;
                    bestEl.textContent = bestScore;
                    localStorage.setItem('2048_best', bestScore);
                }
                addRandomTile();
                renderBoard();
                checkGameState();
            }
        }

        function checkGameState() {
            // Check for 2048 achievement wins optionally (we can let players keep playing)
            const has2048 = board.includes(2048);
            
            // Check if full and no moves remain
            if (!board.includes(0)) {
                let movesLeft = false;
                // Check horizontal adjacents
                for (let r = 0; r < 4; r++) {
                    for (let c = 0; c < 3; c++) {
                        if (board[r*4 + c] === board[r*4 + c + 1]) movesLeft = true;
                    }
                }
                // Check vertical adjacents
                for (let r = 0; r < 3; r++) {
                    for (let c = 0; c < 4; c++) {
                        if (board[r*4 + c] === board[(r+1)*4 + c]) movesLeft = true;
                    }
                }
                
                if (!movesLeft) {
                    showGameOver();
                }
            }
        }

        function showGameOver() {
            endStatusTitle.textContent = "Game Over!";
            endStatusSub.textContent = `You reached ${Math.max(...board)} and scored ${score} pts!`;
            endOverlay.style.display = 'flex';
        }

        // Keyboard setup
        document.addEventListener('keydown', (e) => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
            }
            if (e.key === 'ArrowLeft') attemptMove('left');
            if (e.key === 'ArrowRight') attemptMove('right');
            if (e.key === 'ArrowUp') attemptMove('up');
            if (e.key === 'ArrowDown') attemptMove('down');
        });

        // Click buttons setup
        document.getElementById('m-up').addEventListener('click', () => attemptMove('up'));
        document.getElementById('m-left').addEventListener('click', () => attemptMove('left'));
        document.getElementById('m-right').addEventListener('click', () => attemptMove('right'));
        document.getElementById('m-down').addEventListener('click', () => attemptMove('down'));

        document.getElementById('restartBtn').addEventListener('click', newGame);
        document.getElementById('overlayResetBtn').addEventListener('click', newGame);

        // Start local loop
        newGame();
    </script>
</body>
</html>
