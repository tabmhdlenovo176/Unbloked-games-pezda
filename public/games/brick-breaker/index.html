<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Brick Breaker</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0b0f19;
            color: #f3f4f6;
            font-family: 'SF Pro Display', -apple-system, system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 10px;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 100%;
        }
        .header {
            margin-bottom: 12px;
            text-align: center;
            width: 100%;
        }
        h1 {
            font-size: 22px;
            color: #ec4899;
            text-shadow: 0 0 10px rgba(236, 72, 153, 0.5);
            margin-bottom: 4px;
            font-weight: 800;
            letter-spacing: 1px;
        }
        .meta-row {
            display: flex;
            justify-content: space-between;
            width: 400px;
            max-width: 100%;
            font-size: 13px;
            color: #9ca3af;
            font-weight: bold;
        }
        .highlight {
            color: #f43f5e;
        }
        canvas {
            background-color: #090d16;
            border: 4px solid #ec4899;
            box-shadow: 0 0 25px rgba(236, 72, 153, 0.25);
            border-radius: 8px;
            max-width: 100%;
            display: block;
        }
        .status-overlay {
            position: absolute;
            background: rgba(11, 15, 25, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            padding: 24px;
            border: 2px solid #ec4899;
            text-align: center;
            width: 280px;
        }
        .status-overlay h2 {
            color: #ec4899;
            font-size: 24px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .btn {
            background-color: #ec4899;
            color: #0b0f19;
            border: none;
            padding: 10px 20px;
            font-family: inherit;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            margin-top: 15px;
            transition: all 0.2s;
        }
        .btn:hover {
            background-color: #f43f5e;
            transform: scale(1.05);
        }
        .controls-hint {
            margin-top: 12px;
            font-size: 11px;
            color: #6b7280;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>NEON BREAKOUT</h1>
            <div class="meta-row">
                <div>SCORE: <span id="score" class="highlight">0</span></div>
                <div>LIVES: <span id="lives" class="highlight">3</span></div>
                <div>STAGE: <span id="stage" class="highlight">1</span></div>
            </div>
        </div>

        <div style="position: relative; display: flex; justify-content: center; align-items: center;">
            <canvas id="gameCanvas" width="400" height="420"></canvas>
            
            <div id="overlay" class="status-overlay">
                <h2 id="overlayTitle">Neon Break</h2>
                <p id="overlaySub">Demolish all bricks!</p>
                <button id="startBtn" class="btn">LAUNCH BALL</button>
            </div>
        </div>

        <div class="controls-hint">
            Move mouse or hold Left/Right Keyboard arrows to position Paddle.
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const stageEl = document.getElementById('stage');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlayTitle');
        const overlaySub = document.getElementById('overlaySub');
        const startBtn = document.getElementById('startBtn');

        // Paddle Configuration
        const paddleHeight = 12;
        const paddleWidth = 72;
        let paddleX = (canvas.width - paddleWidth) / 2;
        let rightPressed = false;
        let leftPressed = false;

        // Ball Configuration
        const ballRadius = 6;
        let ballX;
        let ballY;
        let ballDx;
        let ballDy;
        let ballSpeed = 3.5;

        // Bricks Configuration
        const brickRowCount = 5;
        const brickColumnCount = 6;
        const brickWidth = 54;
        const brickHeight = 18;
        const brickPadding = 6;
        const brickOffsetTop = 40;
        const brickOffsetLeft = 24;
        let bricks = [];

        // Game state
        let score = 0;
        let lives = 3;
        let stage = 1;
        let gameActive = false;
        let gameLaunched = false;

        const brickColors = ['#f43f5e', '#ec4899', '#d946ef', '#a855f7', '#6366f1'];

        function resetBricks() {
            bricks = [];
            for (let c = 0; c < brickColumnCount; c++) {
                bricks[c] = [];
                for (let r = 0; r < brickRowCount; r++) {
                    bricks[c][r] = { x: 0, y: 0, status: 1, color: brickColors[r % brickColors.length] };
                }
            }
        }

        function resetBall() {
            ballX = canvas.width / 2;
            ballY = canvas.height - 35;
            ballDx = ballSpeed * (Math.random() > 0.5 ? 1 : -1);
            ballDy = -ballSpeed;
            paddleX = (canvas.width - paddleWidth) / 2;
            gameLaunched = false;
            overlayTitle.textContent = "Stage " + stage;
            overlaySub.textContent = "Get ready!";
            startBtn.textContent = "LAUNCH BALL";
            overlay.style.display = 'flex';
        }

        function initGame() {
            score = 0;
            lives = 3;
            stage = 1;
            scoreEl.textContent = score;
            livesEl.textContent = lives;
            stageEl.textContent = stage;
            resetBricks();
            resetBall();
            gameActive = true;
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Right' || e.key === 'ArrowRight') rightPressed = true;
            if (e.key === 'Left' || e.key === 'ArrowLeft') leftPressed = true;
        });
        document.addEventListener('keyup', (e) => {
            if (e.key === 'Right' || e.key === 'ArrowRight') rightPressed = false;
            if (e.key === 'Left' || e.key === 'ArrowLeft') leftPressed = false;
        });

        // Mouse motion controller
        document.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const relativeX = e.clientX - rect.left;
            if (relativeX > 0 && relativeX < canvas.width) {
                paddleX = relativeX - paddleWidth / 2;
                // keep boundaries
                paddleX = Math.max(0, Math.min(canvas.width - paddleWidth, paddleX));
            }
        });

        // Collision helper
        function collisionDetection() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    const b = bricks[c][r];
                    if (b.status === 1) {
                        if (ballX > b.x && ballX < b.x + brickWidth && ballY > b.y && ballY < b.y + brickHeight) {
                            ballDy = -ballDy;
                            b.status = 0;
                            score += 15;
                            scoreEl.textContent = score;

                            // Check Win / Clear Stage
                            if (checkStageClear()) {
                                nextStage();
                            }
                        }
                    }
                }
            }
        }

        function checkStageClear() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    if (bricks[c][r].status === 1) return false;
                }
            }
            return true;
        }

        function nextStage() {
            stage++;
            stageEl.textContent = stage;
            ballSpeed += 0.5; // harder
            resetBricks();
            resetBall();
        }

        function drawBall() {
            ctx.beginPath();
            ctx.arc(ballX, ballY, ballRadius, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            // Glowing ball effect
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#fff';
            ctx.fill();
            ctx.closePath();
            ctx.shadowBlur = 0; // reset
        }

        function drawPaddle() {
            ctx.beginPath();
            ctx.rect(paddleX, canvas.height - paddleHeight - 10, paddleWidth, paddleHeight);
            ctx.fillStyle = '#ec4899';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ec4899';
            ctx.fill();
            ctx.closePath();
            ctx.shadowBlur = 0; // reset
        }

        function drawBricks() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    if (bricks[c][r].status === 1) {
                        const brickX = c * (brickWidth + brickPadding) + brickOffsetLeft;
                        const brickY = r * (brickHeight + brickPadding) + brickOffsetTop;
                        bricks[c][r].x = brickX;
                        bricks[c][r].y = brickY;
                        
                        ctx.beginPath();
                        ctx.rect(brickX, brickY, brickWidth, brickHeight);
                        ctx.fillStyle = bricks[c][r].color;
                        ctx.shadowBlur = 4;
                        ctx.shadowColor = bricks[c][r].color;
                        ctx.fill();
                        ctx.closePath();
                        ctx.shadowBlur = 0; // reset
                    }
                }
            }
        }

        function draw() {
            // clear
            ctx.fillStyle = '#090d16';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawBricks();
            drawPaddle();
            
            if (gameActive && gameLaunched) {
                drawBall();
                collisionDetection();

                // Ball wall bounce (Left / Right)
                if (ballX + ballDx > canvas.width - ballRadius || ballX + ballDx < ballRadius) {
                    ballDx = -ballDx;
                }
                // Ball ceiling bounce
                if (ballY + ballDy < ballRadius) {
                    ballDy = -ballDy;
                } 
                // Paddle bounce or Drop
                else if (ballY + ballDy > canvas.height - ballRadius - paddleHeight - 10) {
                    if (ballX > paddleX && ballX < paddleX + paddleWidth) {
                        // Angle based on where the ball hits the paddle
                        let hitPt = ballX - (paddleX + paddleWidth / 2);
                        ballDx = hitPt * 0.15;
                        ballDy = -ballDy;
                    } else if (ballY + ballDy > canvas.height - ballRadius) {
                        lives--;
                        livesEl.textContent = lives;
                        if (lives <= 0) {
                            gameOver();
                        } else {
                            resetBall();
                        }
                    }
                }

                ballX += ballDx;
                ballY += ballDy;
            } else {
                // Keep drawing ball relative to static launch position on top of paddle
                ballX = paddleX + paddleWidth / 2;
                ballY = canvas.height - paddleHeight - 20;
                drawBall();
            }

            // Move paddle with Keyboard arrows
            if (rightPressed && paddleX < canvas.width - paddleWidth) {
                paddleX += 6;
            } else if (leftPressed && paddleX > 0) {
                paddleX -= 6;
            }

            requestAnimationFrame(draw);
        }

        function gameOver() {
            gameActive = false;
            overlayTitle.textContent = "GAME OVER";
            overlaySub.textContent = "Top rating speed. Score: " + score;
            startBtn.textContent = "TRY AGAIN";
            overlay.style.display = 'flex';
        }

        startBtn.addEventListener('click', () => {
            if (!gameActive) {
                initGame();
            }
            gameLaunched = true;
            overlay.style.display = 'none';
        });

        // Setup stage initially
        resetBricks();
        resetBall();
        draw();
    </script>
</body>
</html>
